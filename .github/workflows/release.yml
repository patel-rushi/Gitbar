name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run electron:build -- --publish never

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$(mktemp)"
          awk -v hdr="## v${VERSION}" '
            $0 == hdr { grab = 1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md | sed '/./,$!d' > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Maintenance release." > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/*.blockmap

      - name: Update Homebrew cask
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="release/GitBar-${VERSION}-arm64.dmg"
          SHA256="$(shasum -a 256 "$DMG" | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/patel-rushi/homebrew-gitbar.git" tap
          CASK="tap/Casks/gitbar.rb"

          /usr/bin/sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" "$CASK"

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Cask already up to date."
          else
            git add Casks/gitbar.rb
            git commit -m "Update GitBar cask to ${VERSION}"
            git push origin HEAD:main
          fi
